<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
    rel="stylesheet">

  <!-- Title -->
  <title>infoSavi</title>

  <!-- SEO -->
  <meta name="description" content="Unlock your organization's full potential with infoSavi" />
  <meta name="author" content="infoSavi" />

  <!-- Favicon / App Icons -->
  <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="96x96" href="/src/assets/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/apple-touch-icon.png" />
  
  <!-- Web Manifest -->
  <link rel="manifest" href="/src/assets/site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:title" content="infoSavi" />
  <meta property="og:description" content="Unlock your organization's full potential with infoSavi" />
  <meta property="og:type" content="website" />
  <!-- You can update this to the largest/best image for social sharing -->
  <meta property="og:image" content="/src/assets/web-app-manifest-512x512.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Lovable" />
  <meta name="twitter:image" content="/src/assets/web-app-manifest-512x512.png" />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
